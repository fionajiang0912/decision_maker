<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>一页纸决策器</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    background: #F5F1E8;
    color: #2B2B2B;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
      "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 560px;
    margin: 0 auto;
    padding: 32px 20px 64px;
  }
  header { text-align: center; margin-bottom: 24px; }
  .title {
    font-size: 30px;
    font-weight: 800;
    letter-spacing: 1px;
    margin: 0 0 8px;
    color: #1F1F1F;
  }
  .slogan {
    font-size: 16px;
    color: #8A6E4B;
    font-weight: 600;
    margin: 0;
  }
  .hook {
    text-align: center;
    font-size: 13px;
    color: #A79B86;
    margin: 14px 0 22px;
    font-style: italic;
  }
  .card {
    background: #FFFDF8;
    border: 2px solid #E7DEC9;
    border-radius: 16px;
    padding: 18px;
    box-shadow: 0 4px 0 #E7DEC9;
  }
  textarea {
    width: 100%;
    min-height: 120px;
    resize: vertical;
    border: 1.5px solid #E0D5BF;
    border-radius: 12px;
    padding: 14px;
    font-size: 16px;
    font-family: inherit;
    color: #2B2B2B;
    background: #FFFFFF;
    outline: none;
    line-height: 1.5;
  }
  textarea:focus { border-color: #E8A33D; }
  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    min-height: 20px;
  }
  .counter { font-size: 12px; color: #B4A98F; }
  .hint { font-size: 13px; color: #D9534F; font-weight: 600; }
  button {
    display: block;
    width: 100%;
    margin-top: 14px;
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-size: 17px;
    font-weight: 800;
    color: #FFFFFF;
    background: #E8A33D;
    box-shadow: 0 4px 0 #C9832A;
    cursor: pointer;
    letter-spacing: 1px;
    transition: transform .05s ease;
  }
  button:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 2px 0 #C9832A; }
  button:disabled { background: #D8C8A6; box-shadow: 0 4px 0 #C4B591; cursor: default; }

  #result { margin-top: 22px; }
  .verdict {
    margin-bottom: 14px;
    border-radius: 16px;
    padding: 16px 18px;
    border: 2px solid #E7DEC9;
    background: #FFFDF8;
    box-shadow: 0 4px 0 #E7DEC9;
  }
  .verdict h3 {
    margin: 0 0 10px;
    font-size: 16px;
    font-weight: 800;
  }
  .pros h3 { color: #3F8F5B; }
  .cons h3 { color: #C24B4B; }
  .verdict ul { margin: 0; padding-left: 22px; }
  .verdict li { font-size: 15px; line-height: 1.7; margin-bottom: 4px; }
  .advice {
    background: #2B2B2B;
    color: #FDEFD3;
    border: none;
    box-shadow: 0 4px 0 #1A1A1A;
  }
  .advice h3 { color: #E8A33D; }
  .advice p { margin: 0; font-size: 16px; line-height: 1.6; font-weight: 600; }
  .error-box {
    background: #FCEEEE;
    border: 2px solid #E7BEBE;
    color: #B23A3A;
    border-radius: 14px;
    padding: 16px 18px;
    font-size: 15px;
    font-weight: 600;
    text-align: center;
  }
</style>

<div class="wrap">
  <header>
    <h1 class="title">一页纸决策器</h1>
    <p class="slogan">纠结的事，包工头替你拍板</p>
  </header>

  <p class="hook">纠结十分钟，包工头一句话踹醒你。</p>

  <div class="card">
    <textarea id="input" maxlength="1200"
      placeholder="说说你在纠结啥，比如“要不要辞职”"></textarea>
    <div class="row">
      <span class="hint" id="hint"></span>
      <span class="counter" id="counter">0 / 1000</span>
    </div>
    <button id="btn">让包工头拍板</button>
  </div>

  <div id="result"></div>
</div>

<script>
(function () {
  var MAX = 1000;
  var input = document.getElementById("input");
  var btn = document.getElementById("btn");
  var counter = document.getElementById("counter");
  var hint = document.getElementById("hint");
  var result = document.getElementById("result");

  function updateCounter() {
    var len = input.value.length;
    counter.textContent = len + " / " + MAX;
    if (len > MAX) {
      counter.style.color = "#D9534F";
    } else {
      counter.style.color = "#B4A98F";
    }
  }
  input.addEventListener("input", function () {
    updateCounter();
    hint.textContent = "";
  });
  updateCounter();

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }

  function showError(msg) {
    result.innerHTML = '<div class="error-box">' + escapeHtml(msg) + "</div>";
  }

  function pad3(arr) {
    // 保底：确保恰好 3 条，前端不因后端偶发少给而错乱
    var a = Array.isArray(arr) ? arr.slice(0, 3) : [];
    while (a.length < 3) a.push("——");
    return a;
  }

  function render(data) {
    var pros = pad3(data.pros);
    var cons = pad3(data.cons);
    var advice = (data.advice && String(data.advice).trim()) || "这事儿你自己心里其实有数了。";

    var html = "";
    html += '<div class="verdict pros"><h3>👍 支持方</h3><ul>';
    pros.forEach(function (p) { html += "<li>" + escapeHtml(p) + "</li>"; });
    html += "</ul></div>";

    html += '<div class="verdict cons"><h3>👎 反对方</h3><ul>';
    cons.forEach(function (c) { html += "<li>" + escapeHtml(c) + "</li>"; });
    html += "</ul></div>";

    html += '<div class="verdict advice"><h3>🛠 包工头建议</h3><p>' +
      escapeHtml(advice) + "</p></div>";

    result.innerHTML = html;
  }

  function setLoading(on) {
    btn.disabled = on;
    btn.textContent = on ? "包工头正在掂量……" : "让包工头拍板";
  }

  btn.addEventListener("click", function () {
    var text = input.value.trim();
    hint.textContent = "";

    if (!text) {
      hint.textContent = "先说说你纠结啥，我才好拍板呀";
      return;
    }
    if (text.length > MAX) {
      hint.textContent = "话太多啦，挑最纠结那句给我就行";
      return;
    }

    setLoading(true);
    result.innerHTML = "";

    fetch("/api/decide", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ text: text })
    })
      .then(function (resp) {
        return resp.json().then(function (data) {
          return { status: resp.status, data: data };
        });
      })
      .then(function (r) {
        setLoading(false);
        if (r.status === 429) {
          showError((r.data && r.data.error) ||
            "今天太多人来找包工头拍板啦，明天再来~");
          return;
        }
        if (r.status !== 200 || !r.data || r.data.error) {
          showError((r.data && r.data.error) ||
            "哎呀线断了，包工头没听清，再点一下试试");
          return;
        }
        render(r.data);
      })
      .catch(function () {
        setLoading(false);
        showError("哎呀线断了，包工头没听清，再点一下试试");
      });
  });
})();
</script>
